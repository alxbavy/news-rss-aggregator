{% extends "admin/base.html" %}

{% block title %}News RSS Aggregator - Чаты{% endblock %}

{% block content %}
<section class="telegram-chats">
  <div class="telegram-chats__header">
    <h2 class="telegram-chats__title">Чаты</h2>
    <a class="telegram-chats__create-link" href="/admin/telegram-chats/create">
      Добавить
    </a>
  </div>

  <table class="table">
    <thead class="table__head">
      <tr class="table__row">
        <th class="table__cell">ID чата</th>
        <th class="table__cell">Название</th>
        <th class="table__cell">Активен</th>
      </tr>
    </thead>
    <tbody class="table__body">
      {% for item in items %}
      <tr class="table__row">
        <td class="table__cell">{{ item.chat_id }}</td>
        <td class="table__cell">{{ item.title or "-" }}</td>
        <td class="table__cell">{{ item.is_active }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
